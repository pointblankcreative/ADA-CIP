name: Deploy CIP

on:
  push:
    branches:
      - main
      - production

env:
  PROJECT_ID: point-blank-ada
  REGION: northamerica-northeast1
  BACKEND_SERVICE: cip-backend
  FRONTEND_SERVICE: cip-frontend
  SA_EMAIL: cip-sheets-reader@point-blank-ada.iam.gserviceaccount.com

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      backend_service: ${{ steps.env.outputs.backend_service }}
      frontend_service: ${{ steps.env.outputs.frontend_service }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "backend_service=cip-backend" >> "$GITHUB_OUTPUT"
            echo "frontend_service=cip-frontend" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "backend_service=cip-backend-staging" >> "$GITHUB_OUTPUT"
            echo "frontend_service=cip-frontend-staging" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push backend image
        run: |
          gcloud builds submit \
            --project="${{ env.PROJECT_ID }}" \
            --tag="gcr.io/${{ env.PROJECT_ID }}/${{ needs.determine-environment.outputs.backend_service }}" \
            --timeout=600

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ needs.determine-environment.outputs.backend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --image="gcr.io/${{ env.PROJECT_ID }}/${{ needs.determine-environment.outputs.backend_service }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --port=8000 \
            --service-account="${{ env.SA_EMAIL }}" \
            --update-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},BIGQUERY_DATASET=cip,SHEETS_SERVICE_ACCOUNT_FILE=/secrets/cip-sheets-reader.json,APP_ENV=${{ needs.determine-environment.outputs.environment }},ENGINE_VERSION=${{ github.sha }}" \
            --update-secrets="/secrets/cip-sheets-reader.json=cip-sheets-reader-key:latest,SLACK_BOT_TOKEN=cip-slack-bot-token:latest,META_ACCESS_TOKEN=cip-meta-token:latest,STACKADAPT_API_KEY=cip-stackadapt-key:latest" \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --min-instances=0 \
            --max-instances=5 \
            --no-allow-unauthenticated

      - name: Lock backend to the frontend service account
        run: |
          # Backend is private (no --allow-unauthenticated). Grant invoke only to
          # the frontend's runtime service account so the same-origin proxy can
          # reach it. The frontend deploy sets no --service-account, so it runs as
          # the project default compute SA. Idempotent: safe to re-run each deploy.
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          gcloud run services add-iam-policy-binding ${{ needs.determine-environment.outputs.backend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker"

      - name: Enforce IAM invoker check (keep backend private)
        run: |
          # Re-assert the Cloud Run IAM auth check on every deploy. Prod once
          # carried run.googleapis.com/invoker-iam-disabled=true, which makes Cloud
          # Run skip auth entirely - the backend was reachable anonymously even with
          # no allUsers binding, and deploy.yml did not manage that flag. This makes
          # the private posture declarative. Idempotent: a no-op when already on.
          gcloud run services update ${{ needs.determine-environment.outputs.backend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --invoker-iam-check

      - name: Get backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe ${{ needs.determine-environment.outputs.backend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.backend_url.outputs.url }}/health")
          echo "Health check status: $STATUS"
          # 403 is expected and healthy now that the backend requires auth: it means
          # Cloud Run is up and correctly refusing the unauthenticated probe.
          if [[ "$STATUS" != "200" && "$STATUS" != "403" ]]; then
            echo "::warning::Backend health check returned $STATUS"
          fi

    outputs:
      backend_url: ${{ steps.backend_url.outputs.url }}

  deploy-frontend:
    needs: [determine-environment, deploy-backend]
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push frontend image
        run: |
          BACKEND_URL=${{ needs.deploy-backend.outputs.backend_url }}
          FRONTEND_IMAGE="gcr.io/${{ env.PROJECT_ID }}/${{ needs.determine-environment.outputs.frontend_service }}"
          gcloud builds submit \
            --project="${{ env.PROJECT_ID }}" \
            --config=frontend/cloudbuild.yaml \
            --substitutions=_NEXT_PUBLIC_API_URL=${BACKEND_URL},_IMAGE_TAG=${FRONTEND_IMAGE} \
            --timeout=600 \
            ./frontend

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ needs.determine-environment.outputs.frontend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --image="gcr.io/${{ env.PROJECT_ID }}/${{ needs.determine-environment.outputs.frontend_service }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --port=3000 \
            --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }}" \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --min-instances=0 \
            --max-instances=3 \
            --allow-unauthenticated

      - name: Get frontend URL and update CORS
        run: |
          # Get the URL from gcloud (old format)
          OLD_URL=$(gcloud run services describe ${{ needs.determine-environment.outputs.frontend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          echo "Frontend (old format): $OLD_URL"

          # Construct new-format URL: https://{service}-{project_number}.{region}.run.app
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          NEW_URL="https://${{ needs.determine-environment.outputs.frontend_service }}-${PROJECT_NUMBER}.${{ env.REGION }}.run.app"
          echo "Frontend (new format): $NEW_URL"

          # Set CORS to allow both URL formats
          # Use ^##^ delimiter so commas inside the JSON array aren't
          # mistaken for env-var separators by gcloud.
          gcloud run services update ${{ needs.determine-environment.outputs.backend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --update-env-vars="^##^CORS_ORIGINS=[\"${OLD_URL}\",\"${NEW_URL}\"]##FRONTEND_URL=${NEW_URL}"

      - name: Health check
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ needs.determine-environment.outputs.frontend_service }} \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          echo "Frontend health check: $STATUS"
